<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:600px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:15px;
            margin-bottom:5px;
        }

        select,input{
            width:100%;
            padding:10px;
            border-radius:5px;
            border:1px solid #ccc;
            font-size:15px;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:12px;
            border:none;
            background:#007BFF;
            color:white;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .prediction{
            text-align:center;
            margin-top:20px;
            font-size:20px;
            color:green;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Student Exam Performance Predictor</h1>

<form action="{{ url_for('predict_datapoint') }}" method="POST">

<label>Gender</label>
<select name="gender" required>
    <option selected disabled>Select Gender</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
</select>

<label>Race / Ethnicity</label>
<select name="race_ethnicity" required>
    <option selected disabled>Select Group</option>
    <option value="group A">Group A</option>
    <option value="group B">Group B</option>
    <option value="group C">Group C</option>
    <option value="group D">Group D</option>
    <option value="group E">Group E</option>
</select>

<label>Parental Level of Education</label>
<select name="parental_level_of_education" required>
    <option selected disabled>Select Education</option>
    <option value="associate's degree">Associate's Degree</option>
    <option value="bachelor's degree">Bachelor's Degree</option>
    <option value="high school">High School</option>
    <option value="master's degree">Master's Degree</option>
    <option value="some college">Some College</option>
    <option value="some high school">Some High School</option>
</select>

<label>Lunch Type</label>
<select name="lunch" required>
    <option selected disabled>Select Lunch</option>
    <option value="standard">Standard</option>
    <option value="free/reduced">Free / Reduced</option>
</select>

<label>Test Preparation Course</label>
<select name="test_preparation_course" required>
    <option selected disabled>Select Course Status</option>
    <option value="completed">Completed</option>
    <option value="none">None</option>
</select>

<label>Reading Score</label>
<input
type="number"
name="reading_score"
min="0"
max="100"
placeholder="Enter Reading Score"
required>

<label>Writing Score</label>
<input
type="number"
name="writing_score"
min="0"
max="100"
placeholder="Enter Writing Score"
required>

<button type="submit">
Predict Math Score
</button>

</form>

<div class="prediction is ">
    {{ results }}
</div>

</div>

</body>
</html>
